services:
  localstack:
    container_name: woe_localstack
    image: localstack/localstack:3.8.0   # Pinned to the last true zero-auth community release
    ports:
      - "127.0.0.1:4566:4566"            # LocalStack Gateway
      - "127.0.0.1:4510-4559:4510-4559"  # External service ports
    environment:
      - AWS_DEFAULT_REGION=eu-west-1     # Match our Irish production region
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - "${LOCALSTACK_VOLUME_DIR:-./.localstack}:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"