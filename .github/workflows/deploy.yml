name: Stage 1 LocalStack & CDK CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  # --- JOB 1: COMPILE SCALA CODE & RUN TESTS ---
  scala-build:
    name: Scala 3 Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Setup SBT
      uses: sbt/setup-sbt@v1

    # Speed up builds by caching SBT dependencies & local metadata
    - name: Cache SBT Dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.sbt
          ~/.ivy2/cache
          ~/.cache/coursier
        key: ${{ runner.os }}-sbt-${{ hashFiles('**/*.sbt', 'project/build.properties') }}
        restore-keys: |
          ${{ runner.os }}-sbt-

    - name: Verify Code Formatting (Scalafmt)
      run: sbt scalafmtCheckAll

    - name: Compile Application & Infra Code
      run: sbt compile

    - name: Run ScalaUnit/ScalaTest UI Tests
      run: sbt test

  # --- JOB 2: CDK INFRASTRUCTURE VERIFICATION VIA LOCALSTACK ---
  cdk-localstack-check:
    name: CDK Infrastructure Validate (LocalStack)
    runs-on: ubuntu-latest
    needs: scala-build # Only runs if code compiles and tests pass successfully
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java 21 (Required to synthesize Scala/Java CDK apps)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Setup SBT (Required for CDK app to run 'sbt run' internally)
      uses: sbt/setup-sbt@v1

    - name: Setup Node.js (Required for CDK CLI)
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install AWS CDK & CDK-Local Global CLI Tools
      run: npm install -g aws-cdk aws-cdk-local

    # Spin up your Step 4 LocalStack container
    - name: Start LocalStack Container
      run: |
        docker compose -f docker/docker-compose.yml up -d
        echo "Waiting for LocalStack to fully initialize..."
        timeout 30s sh -c 'until curl -s http://localhost:4566/_localstack/health | grep -q "\"services\""; do sleep 2; done'
    - name: CDK Diff against LocalStack
      run: cdklocal diff
      env:
        AWS_DEFAULT_REGION: "eu-west-1"
        AWS_ACCESS_KEY_ID: "mock-local-key"
        AWS_SECRET_ACCESS_KEY: "mock-local-secret"